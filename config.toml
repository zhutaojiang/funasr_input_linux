# funasr_input 配置。
# 密钥等敏感信息请放在 .env 文件中（.env 在 .gitignore 里，不会提交）。

[asr]
# 识别模型预设（后续会有配置对话框可视化切换）：
#   "nano" — Fun-ASR-Nano，多语言 50+、中英混说强、质量高；
#            自回归逐字生成，CPU 上慢、内存大（2GB+）。
#   "fast" — Paraformer（中文为主），非自回归一次出整句，
#            CPU 上通常快数倍、内存更省；多语言能力弱。
# 主要说中文 + CPU 机器，建议 "fast"（标点/错别字由下面的 LLM 润色补齐）。
preset = "fast"

[polish]
# Ollama 本地 Qwen2.5-3B
base_url = "http://localhost:11434/v1"
model    = "qwen2.5:3b-gpu"
# 请求超时（秒）。启动时会预热模型，热请求通常 2s 内完成；
# 若超时将降级返回原文本，不阻塞输入。
timeout  = 8
# 可选：自定义润色 prompt（不填则用内置默认：去语气词、调语序、错别字/标点、
# 组合键「加」转「+」等）。想改润色风格在这里覆盖即可。
prompt = """你是语音输入的文本润色器。把下面这段语音识别的口语结果整理成通顺的书面文本。规则：
1. 删去无意义的语气词和口头禅，如 嗯、啊、呀、呃、哦、那个、就是说、然后那个 等；
2. 去掉口吃、重复和明显赘语；
3. 修正错别字，补全正确标点；但英文专有名词、代码名、工具名等一律保留原文，不要翻译成中文（如 Claude Code 不要译成「云代码」）；
4. 尽量保持原语序和措辞不变，只在明显不通顺或歧义处微调；宁可保留原始表达习惯，也不做不必要的改写；
5. 组合键中的「加」转成「+」并规范按键名（如 Control、Alt、Shift、Space），数字和单位按常规书写；
6. 只输出整理后的文本本身，不要解释、不要加引号或任何前后缀。"""

# 以下为运行选项，后续会接入配置对话框做动态调整；当前先在启动代码里传参，
# 这里仅作记录/占位（暂未被读取）。
